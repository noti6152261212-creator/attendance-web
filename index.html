<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>勤怠打刻</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 980px;
      margin: 40px auto;
      padding: 16px;
      line-height: 1.6;
    }
    h1 { margin-bottom: 24px; }
    h2 { margin-top: 0; }
    input, textarea {
      width: 100%;
      max-width: 320px;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }
    textarea { min-height: 90px; resize: vertical; }
    button {
      padding: 10px 16px;
      font-size: 16px;
      margin-right: 8px;
      margin-bottom: 12px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .section {
      margin-top: 24px;
      padding: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fafafa;
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-start;
    }
    .field { display: flex; flex-direction: column; }
    .field label { font-weight: bold; margin-bottom: 6px; }
    #message { margin-top: 12px; font-weight: bold; min-height: 28px; }
    #historyList, #allStatusList { margin-top: 12px; padding-left: 20px; }
    .muted { color: #666; font-size: 14px; }
    .status-not-started { color: #555; }
    .status-working { color: #0a6; font-weight: bold; }
    .status-finished { color: #06c; }
    .status-invalid { color: #c00; font-weight: bold; }
    .request-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
      background: #fff;
    }
    .request-actions { margin-top: 10px; }
  </style>
</head>
<body>
  <h1>勤怠打刻</h1>

  <div class="section">
    <div class="field">
      <label for="employeeCode">社員番号</label>
      <input id="employeeCode" placeholder="社員番号（例：001）" />
    </div>

    <button id="clockInBtn" onclick="clockIn()">出勤</button>
    <button id="clockOutBtn" onclick="clockOut()">退勤</button>
    <button onclick="loadHistory()">履歴表示</button>
    <button onclick="loadAllStatus()">全員状況</button>

    <p id="message"></p>
  </div>

  <div class="section">
    <strong>今日の状態：</strong>
    <span id="todayStatus">社員番号を入力して履歴表示を押してください</span>
  </div>

  <div class="section">
    <h2>今日の履歴</h2>
    <p class="muted">社員番号を入力して「履歴表示」を押してください</p>
    <ul id="historyList"></ul>
  </div>

  <div class="section">
    <h2>全社員の今日の状況</h2>
    <p class="muted">「全員状況」を押すと一覧表示します</p>
    <ul id="allStatusList"></ul>
  </div>

  <div class="section">
    <h2>修正申請</h2>
    <p class="muted">打刻漏れや誤打刻があった場合に申請します</p>

    <div class="row">
      <div class="field">
        <label for="requestDate">対象日</label>
        <input id="requestDate" type="date" />
      </div>

      <div class="field">
        <label for="requestClockIn">修正後 出勤時刻</label>
        <input id="requestClockIn" type="time" />
      </div>

      <div class="field">
        <label for="requestClockOut">修正後 退勤時刻</label>
        <input id="requestClockOut" type="time" />
      </div>
    </div>

    <div class="field">
      <label for="requestReason">理由</label>
      <textarea id="requestReason" placeholder="例：出勤打刻を忘れました"></textarea>
    </div>

    <button onclick="submitCorrectionRequest()">修正申請を送信</button>
  </div>

  <div class="section">
    <h2>修正申請一覧（管理者用）</h2>
    <p class="muted">未処理の申請を読み込み、承認または却下できます</p>

    <button onclick="loadCorrectionRequests()">修正申請一覧を読み込み</button>
    <div id="requestList"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
    import { SUPABASE_URL, SUPABASE_KEY } from './supabase-config.js'

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

    const employeeCodeInput = document.getElementById('employeeCode')
    const messageEl = document.getElementById('message')
    const historyListEl = document.getElementById('historyList')
    const allStatusListEl = document.getElementById('allStatusList')
    const todayStatusEl = document.getElementById('todayStatus')
    const clockInBtn = document.getElementById('clockInBtn')
    const clockOutBtn = document.getElementById('clockOutBtn')
    const requestListEl = document.getElementById('requestList')

    function formatJapanTime(dateString) {
      const date = new Date(dateString)
      return date.toLocaleTimeString('ja-JP', {
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      })
    }

    function toJstDateRange(targetDate) {
      return {
        start: `${targetDate}T00:00:00+09:00`,
        end: `${targetDate}T23:59:59+09:00`
      }
    }

    function toJstDateTime(targetDate, targetTime) {
      return `${targetDate}T${targetTime}:00+09:00`
    }

    async function getEmployee(code) {
      const { data, error } = await supabase
        .from('employees')
        .select('id, name, employee_code')
        .eq('employee_code', code)
        .single()

      if (error) throw new Error('社員が見つかりません')
      return data
    }

    async function saveLog(employeeId, type) {
      const { error } = await supabase
        .from('attendance_logs')
        .insert([{ employee_id: employeeId, log_type: type }])

      if (error) throw error
    }

    async function getTodayLogs(employeeId) {
      const today = new Date()
      const start = new Date(today)
      start.setHours(0, 0, 0, 0)

      const end = new Date(today)
      end.setHours(23, 59, 59, 999)

      const { data, error } = await supabase
        .from('attendance_logs')
        .select('log_type, logged_at')
        .eq('employee_id', employeeId)
        .gte('logged_at', start.toISOString())
        .lte('logged_at', end.toISOString())
        .order('logged_at', { ascending: true })

      if (error) throw error
      return data || []
    }

    function getAttendanceState(logs) {
      const clockInCount = logs.filter(log => log.log_type === 'clock_in').length
      const clockOutCount = logs.filter(log => log.log_type === 'clock_out').length

      if (clockInCount === 0 && clockOutCount === 0) return 'not_started'
      if (clockInCount === 1 && clockOutCount === 0) return 'working'
      if (clockInCount === 1 && clockOutCount === 1) return 'finished'
      return 'invalid'
    }

    function getStateLabel(state) {
      if (state === 'not_started') return '未出勤'
      if (state === 'working') return '出勤中（退勤待ち）'
      if (state === 'finished') return '本日の打刻完了'
      if (state === 'invalid') return '打刻異常あり（管理者確認）'
      return '状態不明'
    }

    function getStateClass(state) {
      if (state === 'not_started') return 'status-not-started'
      if (state === 'working') return 'status-working'
      if (state === 'finished') return 'status-finished'
      if (state === 'invalid') return 'status-invalid'
      return ''
    }

    function updateButtonsByState(state) {
      if (state === 'not_started') {
        clockInBtn.disabled = false
        clockOutBtn.disabled = true
        todayStatusEl.textContent = '未出勤'
        return
      }
      if (state === 'working') {
        clockInBtn.disabled = true
        clockOutBtn.disabled = false
        todayStatusEl.textContent = '出勤中（退勤待ち）'
        return
      }
      if (state === 'finished') {
        clockInBtn.disabled = true
        clockOutBtn.disabled = true
        todayStatusEl.textContent = '本日の打刻完了'
        return
      }
      if (state === 'invalid') {
        clockInBtn.disabled = true
        clockOutBtn.disabled = true
        todayStatusEl.textContent = '打刻異常あり（管理者確認）'
        return
      }
      clockInBtn.disabled = true
      clockOutBtn.disabled = true
      todayStatusEl.textContent = '打刻状態を確認してください'
    }

    async function renderHistory(employeeId) {
      historyListEl.innerHTML = ''
      const logs = await getTodayLogs(employeeId)

      if (logs.length === 0) {
        historyListEl.innerHTML = '<li>今日の履歴はありません</li>'
      } else {
        logs.forEach((log) => {
          const li = document.createElement('li')
          const label = log.log_type === 'clock_in' ? '出勤' : '退勤'
          li.textContent = `${formatJapanTime(log.logged_at)}　${label}`
          historyListEl.appendChild(li)
        })
      }

      const state = getAttendanceState(logs)
      updateButtonsByState(state)
      return logs
    }

    async function refreshEmployeeStatus() {
      const code = employeeCodeInput.value.trim()

      if (!code) {
        messageEl.innerText = '社員番号を入力してください'
        todayStatusEl.textContent = '社員番号未入力'
        clockInBtn.disabled = true
        clockOutBtn.disabled = true
        historyListEl.innerHTML = ''
        return null
      }

      const employee = await getEmployee(code)
      await renderHistory(employee.id)
      return employee
    }

    async function clockIn() {
      try {
        const employee = await refreshEmployeeStatus()
        if (!employee) return

        const logs = await getTodayLogs(employee.id)
        const state = getAttendanceState(logs)

        if (logs.some(log => log.log_type === 'clock_in')) {
          messageEl.innerText = '今日はすでに出勤済みです'
          updateButtonsByState(state)
          return
        }

        if (state !== 'not_started') {
          messageEl.innerText = '今日はすでに打刻が進んでいます'
          updateButtonsByState(state)
          return
        }

        await saveLog(employee.id, 'clock_in')
        messageEl.innerText = `${employee.name}さんを出勤登録しました`
        await renderHistory(employee.id)
      } catch (e) {
        messageEl.innerText = e.message
      }
    }

    async function clockOut() {
      try {
        const employee = await refreshEmployeeStatus()
        if (!employee) return

        const logs = await getTodayLogs(employee.id)
        const state = getAttendanceState(logs)

        if (state === 'not_started') {
          messageEl.innerText = '先に出勤打刻をしてください'
          updateButtonsByState(state)
          return
        }

        if (state === 'finished') {
          messageEl.innerText = '今日はすでに退勤まで完了しています'
          updateButtonsByState(state)
          return
        }

        if (state === 'invalid') {
          messageEl.innerText = '打刻異常があるため管理者確認が必要です'
          updateButtonsByState(state)
          return
        }

        if (state !== 'working') {
          messageEl.innerText = '打刻状態を確認してください'
          updateButtonsByState(state)
          return
        }

        await saveLog(employee.id, 'clock_out')
        messageEl.innerText = `${employee.name}さんを退勤登録しました`
        await renderHistory(employee.id)
      } catch (e) {
        messageEl.innerText = e.message
      }
    }

    async function loadHistory() {
      try {
        const employee = await refreshEmployeeStatus()
        if (!employee) return
        messageEl.innerText = `${employee.name}さんの今日の履歴を表示しています`
      } catch (e) {
        messageEl.innerText = e.message
      }
    }

    async function loadAllStatus() {
      try {
        messageEl.innerText = '全社員の状況を読み込み中です...'
        allStatusListEl.innerHTML = '<li>読み込み中...</li>'

        const { data: employees, error: empError } = await supabase
          .from('employees')
          .select('id, name, employee_code')

        if (empError) throw empError

        allStatusListEl.innerHTML = ''

        if (!employees || employees.length === 0) {
          allStatusListEl.innerHTML = '<li>社員データがありません</li>'
          messageEl.innerText = '社員データがありません'
          return
        }

        const sortedEmployees = [...employees].sort((a, b) =>
          String(a.employee_code).localeCompare(String(b.employee_code), 'ja')
        )

        for (const emp of sortedEmployees) {
          const logs = await getTodayLogs(emp.id)
          const state = getAttendanceState(logs)

          const li = document.createElement('li')
          li.className = getStateClass(state)
          li.textContent = `${emp.employee_code} ${emp.name}　→　${getStateLabel(state)}`
          allStatusListEl.appendChild(li)
        }

        messageEl.innerText = `全社員の今日の状況を表示しています（${sortedEmployees.length}名）`
      } catch (e) {
        allStatusListEl.innerHTML = `<div class="request-card">エラー: ${e.message}</div>`
        messageEl.innerText = `エラー: ${e.message}`
      }
    }

    async function submitCorrectionRequest() {
      try {
        const code = employeeCodeInput.value.trim()
        const targetDate = document.getElementById('requestDate').value
        const requestedClockIn = document.getElementById('requestClockIn').value
        const requestedClockOut = document.getElementById('requestClockOut').value
        const reason = document.getElementById('requestReason').value.trim()

        if (!code) throw new Error('社員番号を入力してください')
        if (!targetDate) throw new Error('対象日を入力してください')
        if (!reason) throw new Error('理由を入力してください')
        if (!requestedClockIn && !requestedClockOut) {
          throw new Error('出勤時刻か退勤時刻のどちらかを入力してください')
        }

        const employee = await getEmployee(code)

        const { error } = await supabase
          .from('correction_requests')
          .insert([{
            employee_id: employee.id,
            target_date: targetDate,
            requested_clock_in: requestedClockIn || null,
            requested_clock_out: requestedClockOut || null,
            reason: reason
          }])

        if (error) throw error

        document.getElementById('requestDate').value = ''
        document.getElementById('requestClockIn').value = ''
        document.getElementById('requestClockOut').value = ''
        document.getElementById('requestReason').value = ''

        messageEl.innerText = `${employee.name}さんの修正申請を送信しました`
      } catch (e) {
        messageEl.innerText = `エラー: ${e.message}`
      }
    }

    async function loadCorrectionRequests() {
      try {
        requestListEl.innerHTML = '<div class="request-card">読み込み中...</div>'

        const { data, error } = await supabase
          .from('correction_requests')
          .select(`
            id,
            target_date,
            requested_clock_in,
            requested_clock_out,
            reason,
            status,
            created_at,
            employee_id,
            employees(name, employee_code)
          `)
          .eq('status', 'pending')
          .order('created_at', { ascending: true })

        if (error) throw error

        requestListEl.innerHTML = ''

        if (!data || data.length === 0) {
          requestListEl.innerHTML = '<div class="request-card">未処理の申請はありません</div>'
          messageEl.innerText = '未処理の修正申請はありません'
          return
        }

        data.forEach((req) => {
          const card = document.createElement('div')
          card.className = 'request-card'

          const emp = Array.isArray(req.employees) ? req.employees[0] : req.employees
          const employeeLabel = emp
            ? `${emp.employee_code} ${emp.name}`
            : '社員情報なし'

          card.innerHTML = `
            <div><strong>申請者：</strong>${employeeLabel}</div>
            <div><strong>対象日：</strong>${req.target_date}</div>
            <div><strong>修正後 出勤：</strong>${req.requested_clock_in || '-'}</div>
            <div><strong>修正後 退勤：</strong>${req.requested_clock_out || '-'}</div>
            <div><strong>理由：</strong>${req.reason}</div>
            <div><strong>状態：</strong>${req.status}</div>
            <div class="request-actions">
              <button onclick="approveCorrectionRequest('${req.id}')">承認</button>
              <button onclick="rejectCorrectionRequest('${req.id}')">却下</button>
            </div>
          `

          requestListEl.appendChild(card)
        })

        messageEl.innerText = `未処理の修正申請を表示しています（${data.length}件）`
      } catch (e) {
        requestListEl.innerHTML = `<div class="request-card">エラー: ${e.message}</div>`
        messageEl.innerText = `エラー: ${e.message}`
      }
    }

    async function approveCorrectionRequest(requestId) {
      try {
        const { data: req, error: reqError } = await supabase
          .from('correction_requests')
          .select('*')
          .eq('id', requestId)
          .single()

        if (reqError) throw reqError
        if (!req) throw new Error('申請が見つかりません')
        if (req.status !== 'pending') throw new Error('すでに処理済みです')

        const range = toJstDateRange(req.target_date)

        const { error: deleteError } = await supabase
          .from('attendance_logs')
          .delete()
          .eq('employee_id', req.employee_id)
          .gte('logged_at', range.start)
          .lte('logged_at', range.end)

        if (deleteError) throw deleteError

        const newLogs = []

        if (req.requested_clock_in) {
          newLogs.push({
            employee_id: req.employee_id,
            log_type: 'clock_in',
            logged_at: toJstDateTime(req.target_date, req.requested_clock_in)
          })
        }

        if (req.requested_clock_out) {
          newLogs.push({
            employee_id: req.employee_id,
            log_type: 'clock_out',
            logged_at: toJstDateTime(req.target_date, req.requested_clock_out)
          })
        }

        if (newLogs.length > 0) {
          const { error: insertError } = await supabase
            .from('attendance_logs')
            .insert(newLogs)

          if (insertError) throw insertError
        }

        const { error: updateError } = await supabase
          .from('correction_requests')
          .update({
            status: 'approved',
            reviewed_at: new Date().toISOString()
          })
          .eq('id', requestId)

        if (updateError) throw updateError

        messageEl.innerText = '修正申請を承認しました'
        await loadCorrectionRequests()
      } catch (e) {
        messageEl.innerText = `エラー: ${e.message}`
      }
    }

    async function rejectCorrectionRequest(requestId) {
      try {
        const { error } = await supabase
          .from('correction_requests')
          .update({
            status: 'rejected',
            reviewed_at: new Date().toISOString()
          })
          .eq('id', requestId)

        if (error) throw error

        messageEl.innerText = '修正申請を却下しました'
        await loadCorrectionRequests()
      } catch (e) {
        messageEl.innerText = `エラー: ${e.message}`
      }
    }

    employeeCodeInput.addEventListener('input', () => {
      messageEl.innerText = ''
      todayStatusEl.textContent = '社員番号を入力して履歴表示を押してください'
      clockInBtn.disabled = false
      clockOutBtn.disabled = false
    })

    window.clockIn = clockIn
    window.clockOut = clockOut
    window.loadHistory = loadHistory
    window.loadAllStatus = loadAllStatus
    window.submitCorrectionRequest = submitCorrectionRequest
    window.loadCorrectionRequests = loadCorrectionRequests
    window.approveCorrectionRequest = approveCorrectionRequest
    window.rejectCorrectionRequest = rejectCorrectionRequest
  </script>
</body>
</html>
